services:
  - type: web
    name: smart-crop-yield-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: smart-crop-yield-db
          property: connectionString
  - type: web
    name: smart-crop-yield-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://smart-crop-yield-api.onrender.com/api

databases:
  - name: smart-crop-yield-db
    databaseName: smartcrop
    user: smartcrop
